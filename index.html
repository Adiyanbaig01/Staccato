<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Staccato is a dynamic music streaming web app.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="Logo.png">
  <link rel="stylesheet" href="Staccato.css">
  <title>Staccato</title>
</head>

<body>
  <aside class="sidebar">
    <a href="#" class="brand" aria-label="Staccato home">
      <img src="Logo.png" alt="" class="brand-mark">
      <span>Staccato</span>
    </a>

    <nav class="side-nav" aria-label="Primary navigation">
      <a href="#" class="side-nav-item active">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="m3 10 9-7 9 7v10a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1V10Z" />
        </svg>
        Home
      </a>
      <a href="#searchInput" class="side-nav-item">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="m21 21-4.35-4.35m1.35-5.65a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z" />
        </svg>
        Search
      </a>
      <a href="#homeFeed" class="side-nav-item">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M5 4h14v16H5zM9 8h6M9 12h6M9 16h4" />
        </svg>
        Library
      </a>
    </nav>
  </aside>

  <main class="main-content">
    <div class="search-zone">
      <div class="search-wrap">
        <div class="search-form" role="search">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="m21 21-4.35-4.35m1.35-5.65a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z" />
          </svg>
          <input id="searchInput" type="search" autocomplete="off" placeholder="What do you want to play?">
        </div>
        <div class="search-panel" id="searchPanel" aria-live="polite"></div>
      </div>
    </div>

    <div class="home-feed" id="homeFeed"></div>
  </main>

  <footer class="player-bar" id="player">
    <div class="track-meta">
      <img id="playerArt" src="Images/null.png" alt="" class="player-art">
      <div class="track-copy">
        <strong id="playerTitle">No track playing</strong>
        <span id="playerArtist">Search for something you love</span>
      </div>
    </div>

    <div class="transport">
      <div class="transport-buttons">
        <button class="icon-button" id="previousButton" aria-label="Previous track">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M19 20 9 12l10-8v16ZM5 19V5" />
          </svg>
        </button>
        <button class="play-button" id="playPauseButton" aria-label="Play">
          <span id="playPauseIcon">&gt;</span>
          <span class="button-spinner" aria-hidden="true"></span>
        </button>
        <button class="icon-button" id="nextButton" aria-label="Next track">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="m5 4 10 8-10 8V4Zm14 1v14" />
          </svg>
        </button>
      </div>

      <div class="progress-row">
        <span id="currentTime">0:00</span>
        <input id="progressBar" type="range" min="0" max="100" value="0" step="0.1" aria-label="Track progress">
        <span id="durationTime">0:00</span>
      </div>
    </div>

    <div class="player-side">
      <input id="volumeControl" type="range" min="0" max="1" step="0.01" value="0.9" aria-label="Volume">
    </div>
  </footer>

  <audio id="audioPlayer"></audio>
  <script src="config.js"></script>
  <script src="Staccato.js"></script>
</body>

</html>
